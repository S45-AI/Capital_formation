<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>S45 DRHP Workspace — Fusion Klassroom Edutech Limited</title>
<style>
  :root{
    --bg:#FFFFFF;
    --surface:#F9F8F7;
    --surface-2:#FFFFFF;
    --surface-3:#F9F8F7;
    --ink:#2C2C2B;
    --ink-2:#2C2C2B;
    --muted:#91918E;
    --muted-2:#91918E;
    --line:#E1DFDB;
    --line-2:rgba(0,0,0,.0627);
    --accent:#055D56;
    --accent-soft:rgba(5,93,86,.10);
    --accent-deep:#044842;
    --teal:#055D56;
    --teal-deep:#044842;
    --teal-soft:rgba(5,93,86,.10);
    --blue:#91918E;
    --blue-soft:rgba(0,0,0,.0627);
    --green:#055D56;
    --green-soft:rgba(5,93,86,.10);
    --amber:#91918E;
    --amber-soft:rgba(0,0,0,.0627);
    --red:#E56458;
    --red-soft:rgba(229,100,88,.10);
    --violet:#91918E;
    --violet-soft:rgba(0,0,0,.0627);
    --radius:14px;
    --radius-sm:8px;
    --shadow:0 1px 2px rgba(44,44,43,.04),0 6px 20px rgba(44,44,43,.05);
    --shadow-lg:0 18px 50px rgba(44,44,43,.22);
    --sans:'Geist',-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",system-ui,sans-serif;
    --serif:'Martina Plantijn',"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    --mono:'Geist Mono',"SF Mono",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--sans);
    color:var(--ink);
    background:var(--surface-2);
    font-size:13px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#cfd6db;border-radius:8px;border:2px solid transparent;background-clip:content-box}
  ::-webkit-scrollbar-thumb:hover{background:#b6bfc6;background-clip:content-box}
  ::-webkit-scrollbar-track{background:transparent}

  /* ---------- App shell ---------- */
  .app{display:grid;grid-template-columns:236px 1fr;height:100vh;overflow:hidden}

  .sidebar{
    background:rgba(250,250,252,.85);backdrop-filter:saturate(180%) blur(18px);-webkit-backdrop-filter:saturate(180%) blur(18px);
    color:var(--ink-2);display:flex;flex-direction:column;border-right:1px solid var(--line);
  }
  .brand{padding:17px 18px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px}
  .brand .logo{
    width:30px;height:30px;border-radius:9px;background:var(--ink);
    display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:12.5px;letter-spacing:-.5px;
  }
  .brand .bt{font-weight:700;color:var(--ink);font-size:13.5px;letter-spacing:-.1px}
  .brand .bs{font-size:10px;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;font-weight:700}
  .nav{padding:12px 10px;flex:1;overflow:auto}
  .nav-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted-2);padding:14px 10px 7px;font-weight:700}
  .nav-item{
    display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;color:var(--ink-2);
    font-weight:500;font-size:13px;position:relative;margin-bottom:1px;transition:background .12s,color .12s;
  }
  .nav-item:hover{background:var(--surface-3)}
  .nav-item.active{background:var(--accent-soft);color:var(--accent-deep);font-weight:600}
  .nav-item .ic{width:18px;height:18px;flex:none;opacity:.9}
  .nav-item.active .ic{opacity:1;color:var(--accent)}
  .nav-item .badge{margin-left:auto;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;background:var(--surface-3);color:var(--ink-2);min-width:20px;text-align:center}
  .nav-item .badge.red{background:var(--red-soft);color:var(--red)}
  .nav-item .badge.amber{background:var(--amber-soft);color:var(--amber)}
  .side-foot{padding:12px 14px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .avatar{width:30px;height:30px;border-radius:50%;background:var(--accent-soft);color:var(--accent-deep);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex:none}
  .side-foot .nm{font-size:12px;color:var(--ink);font-weight:600}
  .side-foot .rl{font-size:10px;color:var(--muted)}

  .main{display:flex;flex-direction:column;min-width:0;background:var(--surface-2);overflow:hidden}

  /* ---------- Top context bar ---------- */
  .topbar{
    background:var(--bg);border-bottom:1px solid var(--line);padding:0 22px;height:58px;
    display:flex;align-items:center;gap:18px;flex:none;
  }
  .tb-co{display:flex;flex-direction:column;min-width:0}
  .tb-co .nm{font-weight:700;font-size:14.5px;letter-spacing:-.1px;display:flex;align-items:center;gap:9px}
  .tb-co .meta{font-size:11px;color:var(--muted);font-weight:500;display:flex;gap:7px;align-items:center}
  .tag{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:5px;background:var(--surface-2);color:var(--ink-2);border:1px solid var(--line)}
  .tag.teal{background:var(--teal-soft);color:var(--teal-deep);border-color:#cfe6e4}
  .tb-spacer{flex:1}
  .tb-stat{display:flex;flex-direction:column;align-items:flex-end;padding:0 14px;border-left:1px solid var(--line)}
  .tb-stat .v{font-weight:700;font-size:15px;line-height:1.1}
  .tb-stat .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-top:1px}
  .tb-stat .v.red{color:var(--red)} .tb-stat .v.green{color:var(--green)} .tb-stat .v.amber{color:var(--amber)}
  .btn{
    display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:8px;font-weight:600;font-size:12.5px;
    background:var(--surface-2);color:var(--ink);border:1px solid var(--line-2);transition:background .12s,border-color .12s,box-shadow .12s;white-space:nowrap;
  }
  .btn:hover{background:var(--surface-3)}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.primary:hover{background:var(--accent-deep)}
  .btn.blue{background:var(--blue);color:#fff;border-color:var(--blue)}
  .btn.blue:hover{filter:brightness(.94)}
  .btn.ghost{background:transparent;border-color:transparent}
  .btn.ghost:hover{background:var(--surface-2)}
  .btn.sm{padding:5px 10px;font-size:11.5px;border-radius:7px}
  .btn.green{background:var(--green);color:#fff;border-color:var(--green)}
  .btn.danger{background:#fff;color:var(--red);border-color:#F3DEE1}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* ---------- Content scroll ---------- */
  .content{flex:1;overflow:auto;min-height:0}
  .pad{padding:26px 30px;max-width:1320px;margin:0 auto}
  .page-h{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;gap:16px}
  .page-h h1{font-size:21px;font-weight:700;letter-spacing:-.3px}
  .page-h p{color:var(--muted);font-size:12.5px;margin-top:3px}

  /* generic cards */
  .card{background:var(--bg);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .grid{display:grid;gap:16px}
  .stat-grid{grid-template-columns:repeat(4,1fr)}
  .stat{padding:16px 17px;display:flex;flex-direction:column;gap:7px}
  .stat .top{display:flex;align-items:center;justify-content:space-between}
  .stat .lab{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .stat .num{font-size:27px;font-weight:700;letter-spacing:-.6px;line-height:1}
  .stat .sub{font-size:11.5px;color:var(--muted)}
  .dot{width:8px;height:8px;border-radius:50%;flex:none;display:inline-block}
  .dot.green{background:var(--green)} .dot.amber{background:var(--amber)} .dot.red{background:var(--red)}
  .dot.blue{background:var(--blue)} .dot.teal{background:var(--teal)} .dot.grey{background:#b9c1c7}
  .dot.violet{background:var(--violet)}

  /* progress */
  .pbar{height:6px;border-radius:6px;background:var(--surface-3);overflow:hidden}
  .pbar > i{display:block;height:100%;border-radius:6px;background:var(--accent);transition:width .4s}
  .pbar.green > i{background:var(--green)} .pbar.amber > i{background:var(--amber)} .pbar.blue > i{background:var(--blue)} .pbar.red>i{background:var(--red)}

  /* badges / pills */
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;padding:2.5px 8px;border-radius:20px;white-space:nowrap;border:1px solid transparent;letter-spacing:.1px}
  .pill.grey{background:var(--surface-3);color:var(--ink-2)}
  .pill.green{background:var(--green-soft);color:var(--green);border-color:rgba(5,93,86,.3)}
  .pill.amber{background:var(--amber-soft);color:var(--amber);border-color:rgba(0,0,0,.18)}
  .pill.red{background:var(--red-soft);color:var(--red);border-color:#F3DEE1}
  .pill.blue{background:var(--blue-soft);color:var(--blue);border-color:rgba(0,0,0,.18)}
  .pill.teal{background:var(--teal-soft);color:var(--teal-deep);border-color:#c6e3e0}
  .pill.violet{background:var(--violet-soft);color:var(--violet);border-color:#d8cef2}

  table.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
  table.tbl th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;padding:10px 12px;border-bottom:1px solid var(--line);background:var(--surface);position:sticky;top:0}
  table.tbl td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
  table.tbl tr:last-child td{border-bottom:none}
  table.tbl tr.clickable{cursor:pointer}
  table.tbl tr.clickable:hover td{background:var(--surface)}

  .muted{color:var(--muted)}
  .mono{font-family:var(--mono);font-size:11.5px}
  .sec-title{font-size:13px;font-weight:700;letter-spacing:.1px}
  .divider{height:1px;background:var(--line);margin:0}

  /* ---------- Assembly editor 3-pane ---------- */
  .assembly{display:grid;grid-template-columns:236px minmax(0,1fr) 322px;height:100%;overflow:hidden;transition:grid-template-columns .2s}
  .assembly.collapsed{grid-template-columns:236px minmax(0,1fr) 46px}
  .nav-pane{background:var(--bg);border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
  .np-head{padding:13px 14px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:9px}
  .np-search{display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:7px 10px}
  .np-search input{border:none;background:none;outline:none;font-size:12px;width:100%;color:var(--ink)}
  .np-list{overflow:auto;flex:1;padding:6px}
  .np-group{font-size:9.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted-2);font-weight:700;padding:11px 9px 5px}
  .np-item{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;margin-bottom:1px;transition:background .1s}
  .np-item:hover{background:var(--surface)}
  .np-item.active{background:var(--accent-soft)}
  .np-item.active .nt{color:var(--accent-deep);font-weight:700}
  .np-item .nt{font-size:12px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .np-item .rp{font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums;font-weight:600}
  .np-item .bk{font-size:9.5px;font-weight:800;color:#fff;background:var(--red);border-radius:20px;padding:0 5px;min-width:15px;text-align:center;height:15px;line-height:15px}

  .doc-pane{overflow:auto;min-height:0;background:var(--surface-2);position:relative}
  .doc-wrap{max-width:884px;margin:0 auto;padding:26px 20px 92px}
  .sec-header{background:var(--bg);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow)}
  .sec-header .row1{display:flex;align-items:center;justify-content:space-between;gap:14px}
  .sec-header h2{font-size:18px;font-weight:700;letter-spacing:-.2px;display:flex;align-items:center;gap:10px}
  .sec-meta{display:flex;flex-wrap:wrap;gap:18px;margin-top:14px}
  .sec-meta .m{display:flex;flex-direction:column;gap:3px}
  .sec-meta .m .k{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700}
  .sec-meta .m .v{font-size:12.5px;font-weight:600}
  .reviewers{display:flex;gap:5px;align-items:center}
  .rv-chip{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;padding:2px 7px 2px 5px;border-radius:20px;background:var(--surface-2);border:1px solid var(--line)}
  .rv-chip .av{width:16px;height:16px;border-radius:50%;font-size:8.5px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700}
  .rv-chip.ok{background:var(--green-soft);border-color:rgba(5,93,86,.3);color:var(--green)}
  .rv-chip.wait{background:var(--surface-2)}

  /* native work area */
  .native{background:var(--bg);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:16px;box-shadow:var(--shadow);overflow:hidden}
  .native-head{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;background:var(--surface)}
  .native-head .ti{font-size:12px;font-weight:700;letter-spacing:.2px;text-transform:uppercase;color:var(--ink-2);display:flex;align-items:center;gap:8px}
  .native-head .sp{flex:1}
  .native-body{padding:6px 0}

  .timeline{position:relative;padding:6px 18px 10px 30px}
  .tl-item{position:relative;padding:11px 0;border-bottom:1px dashed var(--line)}
  .tl-item:last-child{border-bottom:none}
  .tl-item::before{content:"";position:absolute;left:-15px;top:16px;width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid var(--accent)}
  .tl-item::after{content:"";position:absolute;left:-11px;top:25px;bottom:-11px;width:1px;background:var(--line-2)}
  .tl-item:last-child::after{display:none}
  .tl-row{display:flex;align-items:center;gap:10px}
  .tl-date{font-size:11px;font-weight:700;color:var(--accent-deep);width:86px;flex:none;font-variant-numeric:tabular-nums}
  .tl-title{font-size:12.5px;font-weight:600;flex:1}
  .tl-amt{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}

  /* disclosure block card */
  .block{
    background:var(--bg);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:16px;box-shadow:var(--shadow);
    transition:border-color .12s,box-shadow .12s;cursor:pointer;position:relative;
  }
  .block:hover{border-color:var(--line-2)}
  .block.sel{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft),var(--shadow)}
  .block-head{display:flex;align-items:center;gap:10px;padding:11px 15px;border-bottom:1px solid var(--line)}
  .block-head .bt{font-size:13px;font-weight:700;letter-spacing:-.1px}
  .block-head .ty{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .block-head .sp{flex:1}
  .block-body{padding:14px 17px}
  .narr{font-family:var(--serif);font-size:14.5px;line-height:1.72;color:#1c2226}
  .narr[contenteditable="true"]{outline:none;border-radius:6px;transition:background .1s}
  .narr[contenteditable="true"]:focus{background:#FFFFFF;box-shadow:0 0 0 2px rgba(0,0,0,.18) inset}
  .narr p{margin-bottom:11px}
  .narr p:last-child{margin-bottom:0}
  .ph{background:var(--amber-soft);color:var(--amber);font-weight:700;padding:0 4px;border-radius:4px;font-family:var(--sans);font-size:12.5px;cursor:help}
  .ev-mark{background:#eef4ff;border-bottom:1.5px dotted var(--blue);cursor:pointer;padding:0 1px;border-radius:2px;font-family:var(--sans);font-size:13px}
  .ev-mark:hover{background:#dde9ff}

  /* excel-like table */
  .xl{width:100%;border-collapse:collapse;font-size:12px;font-variant-numeric:tabular-nums}
  .xl th{background:var(--surface-2);border:1px solid var(--line);padding:8px 10px;font-size:10.5px;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);font-weight:700;text-align:right}
  .xl th:first-child{text-align:left}
  .xl td{border:1px solid var(--line);padding:0;text-align:right}
  .xl td:first-child{text-align:left}
  .xl td .cell{padding:8px 10px;outline:none;min-height:20px}
  .xl td .cell[contenteditable="true"]:focus{background:#FFFFFF;box-shadow:0 0 0 2px var(--accent) inset}
  .xl td.locked{background:var(--surface)}
  .xl td.locked .cell{color:var(--ink);font-weight:600}
  .xl tr.total td{background:var(--surface-2);font-weight:700}
  .xl tr.total td .cell{color:var(--ink)}
  .xl-foot{font-size:10.5px;color:var(--muted);padding:8px 12px;display:flex;align-items:center;gap:8px}
  .lockic{display:inline-block;vertical-align:-1px}

  .block-foot{display:flex;align-items:center;gap:8px;padding:10px 15px;border-top:1px solid var(--line);background:var(--surface);flex-wrap:wrap}
  .conf{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--ink-2)}
  .conf .bars{display:flex;gap:2px}
  .conf .bars i{width:4px;height:11px;border-radius:1px;background:var(--surface-3)}
  .conf.high .bars i{background:var(--green)} .conf.med .bars i:nth-child(-n+2){background:var(--amber)} .conf.low .bars i:nth-child(1){background:var(--red)}

  /* update banner inside block */
  .upd{display:flex;align-items:center;gap:11px;padding:10px 15px;background:var(--blue-soft);border-top:1px solid rgba(0,0,0,.18)}
  .upd .txt{font-size:11.5px;color:#173e8f;font-weight:600;flex:1}
  .upd .txt b{font-weight:800}
  .conflict-banner{display:flex;gap:11px;padding:12px 15px;background:var(--red-soft);border-top:1px solid #F3DEE1;align-items:flex-start}
  .conflict-banner .ic{color:var(--red);flex:none;margin-top:1px}
  .conflict-banner .txt{font-size:11.5px;color:#7c211b;flex:1}
  .conflict-banner .txt b{font-weight:800}

  /* placeholder section shell */
  .empty-shell{background:var(--bg);border:1px dashed var(--line-2);border-radius:var(--radius);padding:28px;text-align:center}
  .empty-shell .ttl{font-size:15px;font-weight:700;margin-bottom:6px}
  .req-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;text-align:left;margin:20px auto;max-width:560px}
  .req-box{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:13px 15px}
  .req-box .h{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;margin-bottom:9px}
  .req-box ul{list-style:none;display:flex;flex-direction:column;gap:6px}
  .req-box li{font-size:12px;display:flex;align-items:center;gap:8px}

  /* ---------- right panel ---------- */
  .insp{background:var(--bg);border-left:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
  .insp-tabs{display:flex;border-bottom:1px solid var(--line);padding:0 8px;flex:none}
  .insp-tab{padding:12px 11px;font-size:11.5px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .12s}
  .insp-tab:hover{color:var(--ink-2)}
  .insp-tab.active{color:var(--accent-deep);border-bottom-color:var(--accent)}
  .insp-body{flex:1;overflow:auto;min-height:0}
  .insp-sec{padding:15px 16px;border-bottom:1px solid var(--line)}
  .insp-sec .lab{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;margin-bottom:11px;display:flex;align-items:center;gap:7px}
  .ev-card{display:flex;gap:11px;padding:11px;border:1px solid var(--line);border-radius:8px;margin-bottom:9px;cursor:pointer;transition:border-color .12s,background .12s}
  .ev-card:hover{border-color:var(--accent);background:var(--accent-soft)}
  .ev-card .fic{width:30px;height:38px;flex:none;border-radius:4px;background:#fff;border:1px solid var(--line-2);display:flex;align-items:flex-end;justify-content:center;position:relative;overflow:hidden}
  .ev-card .fic::before{content:"";position:absolute;top:0;right:0;border-width:0 9px 9px 0;border-style:solid;border-color:var(--surface-2) #fff}
  .ev-card .fic .ext{font-size:7px;font-weight:800;color:#fff;background:var(--red);width:100%;text-align:center;padding:1px 0;letter-spacing:.2px}
  .ev-card .fic.pdf .ext{background:#E56458} .ev-card .fic.xls .ext{background:#055D56} .ev-card .fic.doc .ext{background:#91918E}
  .ev-card .info{min-width:0;flex:1}
  .ev-card .info .nm{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ev-card .info .dt{font-size:10.5px;color:var(--muted);margin-top:3px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .kv{display:flex;justify-content:space-between;gap:10px;padding:6px 0;font-size:12px;border-bottom:1px dashed var(--line)}
  .kv:last-child{border-bottom:none}
  .kv .k{color:var(--muted);font-weight:500}
  .kv .v{font-weight:600;text-align:right}
  .check-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line)}
  .check-row:last-child{border-bottom:none}
  .check-row .cb{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--line-2);flex:none;display:flex;align-items:center;justify-content:center;background:#fff}
  .check-row.done .cb{background:var(--green);border-color:var(--green)}
  .check-row .nm{font-size:12px;font-weight:600;flex:1}
  .check-row .who{font-size:10.5px;color:var(--muted)}
  .comment{padding:11px 0;border-bottom:1px solid var(--line)}
  .comment:last-child{border-bottom:none}
  .comment .top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .comment .top .av{width:22px;height:22px;border-radius:50%;font-size:9px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
  .comment .top .nm{font-size:11.5px;font-weight:700}
  .comment .top .tm{font-size:10px;color:var(--muted-2);margin-left:auto}
  .comment .bd{font-size:12px;color:var(--ink-2);line-height:1.55}
  .ver-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line);font-size:11.5px}
  .ver-row:last-child{border-bottom:none}
  .ver-row .vtag{font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--teal-deep);flex:none;width:42px}
  .insp-actions{padding:13px 14px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px;flex:none;background:var(--surface)}
  .insp-empty{padding:50px 26px;text-align:center;color:var(--muted)}
  .insp-empty .ic{margin:0 auto 14px;opacity:.4}

  /* ---------- drawer ---------- */
  .scrim{position:fixed;inset:0;background:rgba(12,20,22,.42);opacity:0;pointer-events:none;transition:opacity .22s;z-index:40}
  .scrim.on{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:540px;max-width:92vw;background:var(--bg);box-shadow:var(--shadow-lg);
    transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.1,1);z-index:50;display:flex;flex-direction:column}
  .drawer.on{transform:none}
  .dr-head{padding:15px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;flex:none}
  .dr-head .ti{font-weight:700;font-size:13.5px;flex:1;min-width:0}
  .dr-head .ti .sub{font-size:11px;color:var(--muted);font-weight:500;margin-top:2px}
  .dr-body{flex:1;overflow:auto;padding:18px;background:var(--surface-2)}
  .pdf-page{background:#fff;border:1px solid var(--line-2);border-radius:6px;box-shadow:var(--shadow);padding:34px 38px;font-family:var(--serif);font-size:12.5px;line-height:1.7;color:#2a3035;position:relative;min-height:520px}
  .pdf-page .pg-no{position:absolute;top:12px;right:16px;font-size:10px;color:var(--muted-2);font-family:var(--sans)}
  .pdf-page h4{font-family:var(--sans);font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:14px;text-align:center}
  .pdf-page .hl{background:rgba(5,93,86,.14);box-shadow:0 0 0 3px rgba(5,93,86,.14);border-radius:2px;outline:1.5px solid #055D56}
  .pdf-page table{width:100%;border-collapse:collapse;margin:12px 0;font-size:11.5px}
  .pdf-page table td,.pdf-page table th{border:1px solid #cfd6db;padding:5px 8px}
  .extracted{margin-top:16px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px 16px}
  .extracted .h{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;margin-bottom:10px}

  /* ---------- modal ---------- */
  .modal{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:60;opacity:0;pointer-events:none;transition:opacity .2s;padding:24px}
  .modal.on{opacity:1;pointer-events:auto}
  .modal .box{background:var(--bg);border-radius:14px;box-shadow:var(--shadow-lg);width:100%;max-width:640px;max-height:88vh;display:flex;flex-direction:column;transform:translateY(10px) scale(.99);transition:transform .2s}
  .modal.on .box{transform:none}
  .modal.wide .box{max-width:860px}
  .mh{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  .mh .ti{font-size:15.5px;font-weight:700;flex:1}
  .mh .ti .sub{font-size:11.5px;color:var(--muted);font-weight:500;margin-top:2px}
  .mb{padding:20px 22px;overflow:auto}
  .mf{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;align-items:center}
  .xbtn{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
  .xbtn:hover{background:var(--surface-2);color:var(--ink)}

  .export-row{display:flex;align-items:center;gap:13px;padding:13px 15px;border:1px solid var(--line);border-radius:9px;margin-bottom:9px;transition:border-color .12s}
  .export-row:hover{border-color:var(--line-2)}
  .export-row .eic{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex:none;font-weight:800;font-size:11px;color:#fff}
  .export-row .info{flex:1;min-width:0}
  .export-row .info .nm{font-size:13px;font-weight:600}
  .export-row .info .ds{font-size:11px;color:var(--muted);margin-top:1px}

  .conflict-side{flex:1;border:1px solid var(--line);border-radius:9px;padding:13px 15px;cursor:pointer;transition:border-color .12s,background .12s}
  .conflict-side:hover{border-color:var(--blue)}
  .conflict-side.pick{border-color:var(--accent);background:var(--accent-soft);box-shadow:0 0 0 2px var(--accent-soft)}
  .conflict-side .src{font-size:11px;font-weight:700;color:var(--ink-2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .conflict-side .val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}

  /* toast */
  .toast-wrap{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:9px;align-items:center}
  .toast{display:flex;align-items:center;gap:11px;background:#1d1d1f;color:#f5f5f7;padding:12px 17px;border-radius:11px;box-shadow:var(--shadow-lg);font-size:12.5px;font-weight:600;
    animation:tin .3s cubic-bezier(.2,.8,.2,1);max-width:520px}
  .toast .ic{flex:none;color:#7fb2ff}
  .toast .sub{color:#a9adb4;font-weight:500;font-size:11px}
  @keyframes tin{from{transform:translateY(14px);opacity:0}to{transform:none;opacity:1}}

  .fade-out{animation:tout .3s forwards}
  @keyframes tout{to{transform:translateY(14px);opacity:0}}

  /* small helpers */
  .row{display:flex;align-items:center;gap:10px}
  .col{display:flex;flex-direction:column}
  .gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap14{gap:14px}
  .wrap{flex-wrap:wrap}
  .right{margin-left:auto}
  .nowrap{white-space:nowrap}
  .hide{display:none !important}
  .link{color:var(--blue);font-weight:600;cursor:pointer}
  .link:hover{text-decoration:underline}
  .hl-soft{background:var(--surface);border-radius:8px}
  .tiny{font-size:10.5px}
  .b{font-weight:700}
  .stamp{font-family:var(--mono);font-size:10px;color:var(--muted-2);letter-spacing:.2px}
  .legend{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .legend .li{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-weight:600}

  /* ---------- Filing Command ---------- */
  .cmd{padding:26px 30px 64px;max-width:1300px;margin:0 auto}
  .cmd-hero{background:var(--bg);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:26px 30px;display:flex;gap:34px;align-items:center;margin-bottom:22px}
  .cmd-hero .eyebrow{font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--accent);margin-bottom:13px;display:flex;align-items:center;gap:7px}
  .cmd-hero h1{font-size:29px;line-height:1.2;font-weight:700;letter-spacing:-.7px;max-width:660px}
  .cmd-hero h1 em{font-style:normal;color:var(--accent)}
  .cmd-hero p{color:var(--muted);font-size:13px;margin-top:13px;max-width:610px;line-height:1.55}
  .cmd-ring{flex:none;display:flex;flex-direction:column;align-items:center;gap:7px}
  .cmd-ring .pct{font-size:24px;font-weight:700;letter-spacing:-.6px}
  .cmd-ring .cap{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700}
  .cmd-hero-stats{display:flex;flex-direction:column;border-left:1px solid var(--line);padding-left:28px;flex:none}
  .chs{display:flex;flex-direction:column;padding:9px 0;border-bottom:1px dashed var(--line);min-width:164px;gap:1px}
  .chs:last-child{border-bottom:none}
  .chs .v{font-size:19px;font-weight:700;letter-spacing:-.4px}
  .chs .l{font-size:11px;color:var(--muted);font-weight:600}

  .cmd-grid{display:grid;grid-template-columns:1.55fr 1fr;gap:20px;align-items:start}
  .cmd-card{background:var(--bg);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px}
  .cmd-card .hd{padding:15px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .cmd-card .hd .t{font-size:13.5px;font-weight:700;letter-spacing:-.1px}
  .cmd-card .hd .s{font-size:11.5px;color:var(--muted);font-weight:500}

  .step{display:flex;gap:15px;padding:17px 18px;border-bottom:1px solid var(--line);align-items:flex-start}
  .step:last-child{border-bottom:none}
  .step .idx{width:26px;height:26px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;background:var(--surface-3);color:var(--ink-2)}
  .step.blocker .idx{background:var(--red-soft);color:var(--red)}
  .step.update .idx{background:var(--accent-soft);color:var(--accent-deep)}
  .step.approval .idx{background:var(--amber-soft);color:var(--amber)}
  .step .body{flex:1;min-width:0}
  .step .ti{font-size:13.5px;font-weight:700;letter-spacing:-.1px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .step .why{font-size:12px;color:var(--ink-2);margin-top:6px;line-height:1.55}
  .step .unlock{font-size:11.5px;color:var(--accent-deep);font-weight:600;margin-top:9px;display:flex;align-items:center;gap:6px}
  .step .act{margin-top:12px}

  .bottleneck{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px dashed var(--line)}
  .bottleneck:last-child{border-bottom:none}
  .bottleneck .nm{font-size:12.5px;font-weight:600}
  .bottleneck .rl{font-size:11px;color:var(--muted)}
  .bottleneck .cnt{margin-left:auto;font-size:11px;font-weight:700}

  .change-row{display:flex;gap:10px;padding:10px 0;border-bottom:1px dashed var(--line);align-items:flex-start}
  .change-row:last-child{border-bottom:none}
  .change-row .dot{margin-top:6px}
  .change-row .tx{font-size:12px;color:var(--ink-2);line-height:1.5;flex:1}
  .change-row .tx b{color:var(--ink);font-weight:700}

  .sct-cols{display:grid;grid-template-columns:1fr 1fr;gap:18px;padding:16px 18px}
  .sct-col .h{font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:11px;display:flex;align-items:center;gap:7px}
  .sct-chip{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px dashed var(--line);font-size:12px;cursor:pointer}
  .sct-chip:last-child{border-bottom:none}
  .sct-chip:hover .snm{color:var(--accent)}
  .sct-chip .snm{flex:1;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .export-ready{padding:16px 18px}
  .er-row{display:flex;align-items:center;gap:12px;padding:13px;border:1px solid var(--line);border-radius:10px;margin-bottom:10px}
  .er-row:last-child{margin-bottom:0}
  .er-row .eic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none}
  .er-row .eic.ok{background:var(--green-soft);color:var(--green)}
  .er-row .eic.no{background:var(--amber-soft);color:var(--amber)}
  .er-row .info{flex:1}
  .er-row .info .t{font-size:12.5px;font-weight:700}
  .er-row .info .s{font-size:11px;color:var(--muted);margin-top:1px}

  /* ---------- conflict cockpit ---------- */
  .cock-side{flex:1;border:1.5px solid var(--line);border-radius:12px;cursor:pointer;transition:border-color .14s,box-shadow .14s;overflow:hidden;background:#fff;position:relative}
  .cock-side:hover{border-color:var(--accent)}
  .cock-side.pick{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .cock-side.rec::after{content:"Recommended";position:absolute;top:11px;right:12px;font-size:9px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--accent-deep);background:var(--accent-soft);padding:2px 8px;border-radius:20px}
  .cock-side .ch{padding:13px 15px 12px;border-bottom:1px solid var(--line);background:var(--surface)}
  .cock-side .src{font-size:11.5px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:7px;padding-right:84px}
  .cock-side .val{font-size:19px;font-weight:700;font-variant-numeric:tabular-nums;padding:14px 15px 8px;letter-spacing:-.3px;line-height:1.25}
  .cock-side .meta{padding:0 15px 14px;display:flex;flex-direction:column;gap:8px}
  .cock-side .mr{display:flex;align-items:center;gap:8px;font-size:11px}
  .cock-side .mr .k{color:var(--muted);width:62px;flex:none}
  .cock-side .mr .v{font-weight:600}
  .cock-rec{display:flex;gap:9px;align-items:flex-start;background:var(--accent-soft);border-radius:10px;padding:12px 14px;margin-top:16px}
  .cock-rec .tx{font-size:12px;color:#0a3a86;line-height:1.5}
  .note-in{background:#fff;border:1px solid var(--line-2);border-radius:9px;padding:10px 12px;width:100%;font-size:12.5px;font-family:inherit;outline:none;color:var(--ink)}
  .note-in:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

  /* ---------- Live DRHP: mode switch, NBA, workboard ---------- */
  .mode-switch{display:inline-flex;background:var(--surface-3);border-radius:11px;padding:3px;gap:3px;margin:0 2px 16px}
  .mode{display:flex;flex-direction:column;align-items:flex-start;padding:7px 18px;border-radius:9px;font-size:13px;font-weight:600;color:var(--ink-2);transition:background .14s,box-shadow .14s,color .14s;min-width:138px}
  .mode .sub{font-size:10px;font-weight:500;color:var(--muted);margin-top:1px}
  .mode.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
  .mode.on .sub{color:var(--accent)}

  .nba{display:flex;align-items:center;gap:14px;background:var(--bg);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:12px;padding:13px 16px;margin:0 2px 16px;box-shadow:var(--shadow)}
  .nba .ic{color:var(--accent);flex:none}
  .nba .col{flex:1;min-width:0}
  .nba .lb{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700}
  .nba .tt{font-size:13.5px;font-weight:700;margin-top:3px;letter-spacing:-.1px}
  .nba .wy{font-size:11.5px;color:var(--ink-2);margin-top:3px;line-height:1.45}

  .ai-panel{display:grid;grid-template-columns:1fr 1fr;background:var(--bg);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow)}
  .ai-col{padding:15px 17px}
  .ai-col+.ai-col{border-left:1px solid var(--line)}
  .ai-col .h{font-size:11px;font-weight:700;display:flex;align-items:center;gap:7px;margin-bottom:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-2)}
  .ai-col ul{list-style:none;display:flex;flex-direction:column;gap:9px}
  .ai-col li{font-size:12px;color:var(--ink-2);display:flex;gap:9px;line-height:1.45}
  .ai-col li::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--line-2);margin-top:6px;flex:none}
  .ai-col.done li::before{background:var(--green)}
  .ai-col.todo li::before{background:var(--amber)}
  .ai-objs{grid-column:1/-1;border-top:1px solid var(--line);background:var(--surface);padding:11px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .ai-objs .lb{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;margin-right:2px}
  .obj-chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;background:#fff;border:1px solid var(--line);border-radius:20px;padding:3px 11px}
  .obj-chip .n{font-variant-numeric:tabular-nums;font-weight:800;color:var(--ink-2)}
  .obj-chip.ok .n{color:var(--green)} .obj-chip.warn .n{color:var(--amber)} .obj-chip.conflict .n{color:var(--red)}

  .draft-bar{display:flex;align-items:center;margin:0 2px 16px}
  .seg{display:inline-flex;background:var(--surface-3);border-radius:9px;padding:3px;gap:3px}
  .seg-b{padding:6px 14px;border-radius:7px;font-size:12px;font-weight:600;color:var(--ink-2)}
  .seg-b.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}

  /* inspector additions */
  .insp-head{padding:14px 16px 12px;border-bottom:1px solid var(--line)}
  .tb-badge{margin-left:6px;font-size:9px;font-weight:800;background:var(--red);color:#fff;border-radius:20px;padding:0 5px;min-width:15px;display:inline-block;text-align:center;line-height:15px;vertical-align:1px}
  .issue-row{display:flex;gap:10px;padding:11px 0;border-bottom:1px dashed var(--line);align-items:flex-start}
  .issue-row:last-child{border-bottom:none}
  .issue-row .dot{margin-top:5px}
  .appr-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line);align-items:flex-start}
  .appr-row:last-child{border-bottom:none}
  .insp-tab{padding:11px 9px;font-size:11.5px}

  /* middle-pane dominance: collapsed inspector rail */
  .insp-rail{border-left:1px solid var(--line);background:var(--bg);display:flex;flex-direction:column;align-items:center;gap:16px;padding:18px 0;cursor:pointer;color:var(--muted)}
  .insp-rail:hover{background:var(--surface);color:var(--ink-2)}
  .insp-rail .lbl{writing-mode:vertical-rl;transform:rotate(180deg);font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase}

  /* DRHP Draft — living filing document */
  .filing{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:38px 54px 26px;margin:0 2px}
  .filing-h{border-bottom:2px solid var(--ink);padding-bottom:15px;margin-bottom:6px}
  .filing-h .kicker{font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted)}
  .filing-h h1{font-size:23px;font-weight:700;letter-spacing:-.4px;margin-top:7px}
  .filing-h .filing-sub{font-size:12px;color:var(--muted);margin-top:5px}
  .filing-foot{text-align:center;color:var(--muted-2);font-size:11px;font-family:var(--serif);font-style:italic;margin-top:18px;padding-top:14px;border-top:1px solid var(--line)}
  .filing .block{background:transparent;border:none;border-radius:0;box-shadow:none;margin:0 -18px;padding:2px 18px 0;border-top:1px solid var(--line);position:relative}
  .filing .block:first-of-type{border-top:none}
  .filing .block::before{content:"";position:absolute;left:0;top:10px;bottom:10px;width:3px;background:transparent;border-radius:3px;transition:background .14s}
  .filing .block:hover{background:var(--surface-2)}
  .filing .block.sel{background:var(--accent-soft)}
  .filing .block.sel::before{background:var(--accent)}
  .filing .block-head{border-bottom:none;padding:16px 0 2px;background:transparent}
  .filing .block-head .bt{font-size:15.5px;font-family:var(--serif);font-weight:700}
  .filing .block-head .ty{opacity:0;transition:opacity .14s}

function renderNav(){
  const qn = QUEUE.length, bl = pendingBlockers();
  document.getElementById('nav').innerHTML =
    `<div class="nav-label">Klassroom DRHP</div>` +
    NAVI.map(([id,label,ic])=>{
      let badge='';
      if(id==='queue') badge=`<span class="badge amber">${qn}</span>`;
      if(id==='workspace') badge=`<span class="badge red">${bl}</span>`;
      return `<div class="nav-item ${state.screen===id?'active':''}" onclick="go('${id}')">${ic}<span>${label}</span>${badge}</div>`;
    }).join('');
}

  const tb=document.getElementById('topbar');

  renderNav(); renderTopbar();

function criticalSteps(){
  const steps=[];
  for(const k in BLOCKS) BLOCKS[k].forEach(b=>{
    if(b.status==='conflict'&&b.conflict){
      steps.push({sev:'blocker',tag:'Conflict',
        title:'Resolve contradiction in '+getSec(k).name,
        why:b.conflict.a.src.split('—')[0].trim()+' and '+b.conflict.b.src.split('—')[0].trim()+' disagree. '+b.conflict.rec,
        unlocks:'unlocks '+getSec(k).name+' section approval',
        btn:`<button class="btn primary" onclick="openConflict('${k}','${b.id}')">${I.alert} Resolve conflict</button>`});
    }
  });
  for(const k in BLOCKS) BLOCKS[k].forEach(b=>{
    if(b.status==='updateavail'&&b.upd&&['restated','objects'].includes(k)){
      steps.push({sev:'update',tag:'Update',
        title:'Accept '+b.upd.field.toLowerCase()+' update — '+getSec(k).name,
        why:b.upd.reason+'. Value moves '+b.upd.was+' → '+b.upd.now+'.',
        unlocks:'moves '+getSec(k).name+(k==='restated'?' and Summary Financial Information':'')+' to '+(k==='restated'?'auditor-ready':'banker-ready'),
        btn:`<div class="row gap8"><button class="btn" onclick="compareUpdate('${b.id}')">${I.compare} Compare</button><button class="btn blue" onclick="acceptUpdate('${k}','${b.id}')">${I.check} Accept update</button></div>`});
    }
  });
  const ap=getSec('approvals');
  if(ap && ap.status==='legalreview' && ap.blockers>0){
    steps.push({sev:'approval',tag:'Approval',
      title:'Request legal sign-off on Government & Other Approvals',
      why:'22 approvals tracked; 2 are expiring and need a renewal-disclosure confirmation from legal counsel before the section can be approved.',
      unlocks:'removes 2 legal blockers and enables review-draft export',
      btn:`<button class="btn primary" onclick="requestApproval('approvals','Legal')">Request legal approval</button>`});
  }
  return steps;
}

}

/* ----- Next best action strip ----- */
function nextBestAction(sec){
  const blocks=BLOCKS[sec.id]||[];
  if(!blocks.length){
    if(sec.status==='empty') return {label:'Generate '+sec.name+' draft',why:'Required inputs are partially present. Generate the first disclosure blocks for review.',cta:`<button class="btn primary sm" onclick="generateSection('${sec.id}')">${I.bolt} Generate section draft</button>`,unlocks:'first draft blocks'};
    return {label:'Upload source documents',why:'This section needs its source documents before extraction can begin.',cta:`<button class="btn sm" onclick="go('sources')">Open Source Room</button>`,unlocks:'extraction'};
  }
  const conflict=blocks.find(b=>b.status==='conflict');
  if(conflict) return {label:'Resolve contradiction in '+conflict.title,why:conflict.conflict.rec,cta:`<button class="btn primary sm" onclick="openConflict('${sec.id}','${conflict.id}')">${I.alert} Resolve conflict</button>`,unlocks:sec.name+' section approval'};
  const upd=blocks.find(b=>b.status==='updateavail');
  if(upd) return {label:'Accept '+upd.upd.field+' update',why:upd.upd.reason+' ('+upd.upd.was+' → '+upd.upd.now+').',cta:`<div class="row gap8"><button class="btn sm" onclick="compareUpdate('${upd.id}')">Compare</button><button class="btn blue sm" onclick="acceptUpdate('${sec.id}','${upd.id}')">${I.check} Accept</button></div>`,unlocks:sec.name+' progress'};
  const needs=blocks.find(b=>['needsreview','draftgen','sourcelinked'].includes(b.status));
  if(needs) return {label:'Review & approve '+needs.title,why:'Draft is source-linked and awaiting human review.',cta:`<button class="btn green sm" onclick="selectBlock('${needs.id}')">Open & review</button>`,unlocks:'block approval'};
  if(sec.status!=='approved') return {label:'Approve '+sec.name,why:'All blocks reviewed. Required reviewers can now approve the section.',cta:`<button class="btn green sm" onclick="approveSection('${sec.id}')">${I.check} Approve section</button>`,unlocks:'filing-ready section'};
  return {label:sec.name+' is filing ready',why:'No action required — section approved by all required reviewers.',cta:'',unlocks:''};
}

const BLOCK_STATUS={

function renderBlock(b,sec){

      <div class="txt"><b>Contradiction detected.</b> ${b.conflict.a.src.split('—')[0]}vs ${b.conflict.b.src.split('—')[0]}.<br>

      <button class="btn sm blue" onclick="event.stopPropagation();acceptUpdate('${sec.id}','${b.id}')">${I.check} Accept</button></div>`;
  }

  const confL={high:"High",med:"Medium",low:"Low"}[b.conf]||"—";
  return `<div class="block ${state.block===b.id?'sel':''}" id="blk-${b.id}" onclick="selectBlock('${b.id}')">

      <span class="bt">${b.title}</span>

      <span class="ty">${b.type}</span>
      <span class="pill ${st.c}">${st.l}</span>

        ? `<button class="btn sm" onclick="event.stopPropagation();lockBlock('${sec.id}','${b.id}')">${I.lock} ${b.status==='locked'?'Locked':'Lock'}</button>`
        : `<button class="btn sm green" onclick="event.stopPropagation();approveBlock('${sec.id}','${b.id}')">${I.check} Approve block</button>`}

  </div>`;
}

function renderHtmlTable(t){
  let h=`<table class="xl" style="margin-top:4px"><thead><tr>${t.cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>`;
  t.rows.forEach((r,ri)=>{
    const locked=(t.locked||[]).includes(ri+1);
    h+=`<tr>`;
    r.forEach((cell,ci)=>{
      if(ci===r.length-1 && Array.isArray(cell)) return; // skip evidence array col
      const isEvCol = ci===r.length-2 && Array.isArray(r[r.length-1]);
      const evs = Array.isArray(r[r.length-1])?r[r.length-1]:[];
      h+=`<td class="${locked?'locked':''}"><div class="cell" contenteditable="${!locked&&state.draft==='clean'}">${cell}${ci===0&&evs.length?` <span class="ev-mark" data-ev="${evs[0]}" onclick="event.stopPropagation();openDrawer('${evs[0]}')" style="font-size:10px">src</span>`:''}</div></td>`;
    });
    h+=`</tr>`;
  });
  if(t.total){ h+=`<tr class="total">${t.total.map(c=>`<td><div class="cell">${c}</div></td>`).join('')}</tr>`; }
  h+=`</tbody></table>`;
  return h;
}
function renderXL(x,bid){
  let h=`<table class="xl"><thead><tr>${x.cols.map((c,i)=>`<th>${c}</th>`).join('')}</tr></thead><tbody>`;
  x.rows.forEach(r=>{
    h+=`<tr class="${r.total?'total':''}">`;
    h+=`<td class="${r.locked?'locked':''}" style="text-align:left"><div class="cell">${r.label}${r.locked?` <span class="lockic" style="color:var(--teal);vertical-align:-1px">${I.lock}</span>`:''}${r.computed?` <span class="muted tiny">ƒ</span>`:''}</div></td>`;
    r.v.forEach(val=>{
      const editable = !r.locked && !r.computed && state.draft==='clean';
      h+=`<td class="${r.locked?'locked':''}"><div class="cell" contenteditable="${editable}" oninput="overrideWarn('${bid}',this)">${val}</div></td>`;
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table><div class="xl-foot">${I.lock} Locked cells are audited values from BSR & Co certificate. <span class="muted">ƒ = computed</span> · Manual override creates an audit-tracked exception.</div>`;
  return h;
}

function collectIssues(sec,b){
  const blocks=b?[b]:(BLOCKS[sec.id]||[]);
  const out=[];
  blocks.forEach(x=>{
    if(x.status==='conflict'&&x.conflict) out.push({sev:'blocker',title:'Contradiction — '+x.title,detail:x.conflict.a.src.split('—')[0].trim()+' vs '+x.conflict.b.src.split('—')[0].trim(),cta:`<button class="btn sm danger" style="margin-top:7px" onclick="openConflict('${sec.id}','${x.id}')">Resolve</button>`});
    if(x.status==='updateavail'&&x.upd) out.push({sev:'warn',title:'Update available — '+x.title,detail:x.upd.field+': '+x.upd.was+' → '+x.upd.now});
    if(x.conf==='low') out.push({sev:'warn',title:'Low confidence — '+x.title,detail:'Recommend human verification of extracted values.'});
    else if(b&&x.conf==='med') out.push({sev:'info',title:'Medium confidence — '+x.title,detail:'Two or more sources support this; spot-check before approval.'});
    if((x.content||'').includes('●')||(x.xl&&JSON.stringify(x.xl).includes('●'))||(x.table&&JSON.stringify(x.table).includes('●'))) out.push({sev:'info',title:'Placeholder [●] — '+x.title,detail:'Awaiting a final value before the clean filing copy.'});
  });
  const srcIds=[...new Set(blocks.flatMap(x=>x.sources||[]))];
  srcIds.forEach(id=>{const d=resolveDoc(id);(d.flags||[]).forEach(f=>{if(/conflict|stale|unsigned|expir|supersede/i.test(f)) out.push({sev:'warn',title:f,detail:d.name});});});
  return out;
}

function inferReviewer(secId){const r=(REVIEWERS[secId]||['Banker'])[0];return ROLE_PERSON[r]||'AM'}

/* conflict resolution */
let conflictPick=null;
function openConflict(secId,bid){
  const b=findBlock(bid); const cf=b.conflict;
  conflictPick=null;
  const ma=srcMeta(cf.a.src), mb=srcMeta(cf.b.src);
  const rank={'Audited / certified':5,'Statutory order':4,'Depository record':4,'Lender document':3,'Management certificate':2,'Management input':1};
  const recSide=(rank[ma.quality]||0)>=(rank[mb.quality]||0)?'a':'b';
  const sides=[['a',cf.a,ma],['b',cf.b,mb]];
  openModal(`<div class="mh"><div class="ti">${I.alert} Resolve contradiction — decision cockpit<div class="sub">${b.title} · ${getSec(secId).name}</div></div><button class="xbtn" onclick="closeOverlays()">${I.x}</button></div>
    <div class="mb">
      <div class="muted tiny" style="margin-bottom:14px">Two sources disagree. Compare provenance, select the source of truth, and record the basis. The rejected source is preserved in the audit trail and a memory rule is created.</div>
      <div class="row gap14" id="confSides" style="align-items:stretch">
        ${sides.map(([side,c,mm])=>`
        <div class="cock-side ${recSide===side?'rec':''}" data-side="${side}" onclick="pickConflict('${side}')">
          <div class="ch"><div class="src"><span class="dot ${mm.q}"></span>Source ${side.toUpperCase()}</div><div class="muted tiny" style="margin-top:5px">${c.src}</div></div>
          <div class="val">${c.val}</div>
          <div class="meta">
            <div class="mr"><span class="k">Quality</span><span class="v"><span class="pill ${mm.q}">${mm.quality}</span></span></div>
            <div class="mr"><span class="k">Dated</span><span class="v">${mm.date}</span></div>
            <div class="mr"><span class="k">Provenance</span><span class="v">${mm.signed}</span></div>
          </div>
        </div>`).join('')}
      </div>
      <div class="cock-rec"><span style="color:var(--accent)">${I.bolt}</span><div class="tx"><b>System recommendation.</b> ${cf.rec}</div></div>
      <div class="row gap8 wrap" style="margin-top:14px"><span class="muted tiny">Impacted blocks &amp; sections:</span>${cf.impacted.map(x=>`<span class="pill grey">${x}</span>`).join('')}</div>
      <div style="margin-top:16px"><div class="lab" style="font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;margin-bottom:8px">Reviewer note (required)</div>
        <input class="note-in" id="confNote" placeholder="Explain the basis for this source-of-truth decision…"></div>
    </div>
    <div class="mf"><span class="muted tiny right" id="confHint">Select a source of truth</span><button class="btn primary" id="confBtn" disabled onclick="resolveConflict('${secId}','${bid}')">${I.check} Resolve &amp; record</button></div>`);
}
function srcMeta(srcStr){
  const s=srcStr.toLowerCase();
  let quality='Management input',q='grey',signed='Self-certified';
  if(s.includes('audit')||s.includes('certificate')&&!s.includes('management')){quality='Audited / certified';q='green';signed='Signed & certified';}
  else if(s.includes('drc')||s.includes('order')){quality='Statutory order';q='teal';signed='Issued by authority';}
  else if(s.includes('nsdl')||s.includes('benpos')||s.includes('depository')){quality='Depository record';q='teal';signed='System-generated';}
  else if(s.includes('sanction')||s.includes('loan')||s.includes('hdfc')){quality='Lender document';q='blue';signed='Counterparty-signed';}
  else if(s.includes('management')){quality='Management certificate';q='amber';signed='Self-certified';}
  const m=srcStr.match(/(\d{1,2}\s+\w+\s+\d{4})/);
  return {quality,q,signed,date:m?m[1]:'\u2014'};
}
function pickConflict(side){
  conflictPick=side;
  document.querySelectorAll('#confSides .cock-side').forEach(el=>el.classList.toggle('pick',el.dataset.side===side));
  document.getElementById('confBtn').disabled=false;
  document.getElementById('confHint').textContent='Source '+side.toUpperCase()+' selected as source of truth';
}
function resolveConflict(secId,bid){
  const note=document.getElementById('confNote').value.trim();
  if(!conflictPick){return}
  if(!note){document.getElementById('confNote').focus();document.getElementById('confHint').textContent='Reviewer note is required';return}
  const b=findBlock(bid); const chosen=conflictPick==='a'?b.conflict.a:b.conflict.b; const rej=conflictPick==='a'?b.conflict.b:b.conflict.a;
  b.status='verified'; b.conflict=null;
  const sec=getSec(secId); sec.blockers=Math.max(0,sec.blockers-1); sec.readiness=Math.min(100,sec.readiness+3);
  resolveQueue(secId,['Conflict']);
  audit(inferReviewer(secId),'Source of truth',`Resolved contradiction on "${b.title}" — adopted ${chosen.src.split('—')[0].trim()}. Rejected: ${rej.src.split('—')[0].trim()}. Note: ${note}`,true,`On conflict, prefer ${chosen.src.split('—')[0].trim()} for this disclosure type`);
  closeOverlays();
  toast('Conflict resolved',`Source of truth recorded · ${sec.name} blocker cleared · ${sec.blockers} left`,'check');
  render();
}

/* section-level */
function approveSection(secId){
  const sec=getSec(secId);
  if(sec.blockers>0){ toast('Cannot approve yet',`${sec.blockers} blocker${sec.blockers>1?'s':''} must be resolved first`,'alert'); return; }
  const role=inferRole(inferReviewer(secId));
  SECTION_APPROVALS[secId]=SECTION_APPROVALS[secId]||new Set();
  SECTION_APPROVALS[secId].add(role);
  const req=REVIEWERS[secId]||[role];
  const allDone=req.every(r=>SECTION_APPROVALS[secId].has(r));
  if(allDone){ sec.status='approved'; sec.readiness=100; toast('Section approved',`${sec.name} is filing-ready`,'check'); }
  else { toast('Approval recorded',`${role} approved. Awaiting ${req.filter(r=>!SECTION_APPROVALS[secId].has(r)).join(', ')}`); }
  audit(inferReviewer(secId),'Verification',`${role} approved section "${sec.name}"`);
  render();
}
function publishSection(secId){
  toast('Published to DRHP',`${getSec(secId).name} disclosure blocks are live in the assembly`,'check');
  audit('AM','Verification',`Published ${getSec(secId).name} blocks to DRHP assembly`);
}
function generateSection(secId){
  const sec=getSec(secId);
  sec.status='processing'; sec.readiness=15;
  toast('Generating section','Extraction engine is drafting disclosure blocks…');
  render();
  setTimeout(()=>{ sec.status='draft'; sec.readiness=45; toast('Draft generated',`${sec.name} now has draft blocks for review`,'check'); render(); },1100);
}

/* comments */
function addComment(bid){
  const inp=document.getElementById('cmtInput'); if(!inp||!inp.value.trim())return;
  toast('Comment posted','Block-level comment added for reviewers');
  audit('AM','Comment',`Commented on "${findBlock(bid).title}": ${inp.value.trim()}`);
  inp.value='';
}

/* edits create memory */
let editedBlocks=new Set();
function markEdited(bid){
  if(editedBlocks.has(bid))return;
  editedBlocks.add(bid);
  setTimeout(()=>{ if(editedBlocks.has(bid)){ audit('AM','Human edit',`Manually edited narrative in "${findBlock(bid).title}"`,true,'Preserve banker phrasing for this disclosure on regenerate'); editedBlocks.delete(bid); } },1500);
}
function overrideWarn(bid,cell){
  if(cell.dataset.warned)return; cell.dataset.warned='1';
  toast('Manual override','Editing an audited value creates a tracked exception','alert');
  audit('AM','Human edit',`Manual override of audited value in "${findBlock(bid).title}"`,true,'Flag manual overrides of audited cells for auditor sign-off');
}

/* export modal */
function openExport(){
  openModal(`<div class="mh"><div class="ti">Export DRHP<div class="sub">${project.company} · ${project.version} · ${readiness()}% ready</div></div><button class="xbtn" onclick="closeOverlays()">${I.x}</button></div>
    <div class="mb">
      <div class="row gap14" style="padding:11px 14px;background:${pendingBlockers()?'var(--amber-soft)':'var(--green-soft)'};border-radius:9px;margin-bottom:14px">
        <span style="color:${pendingBlockers()?'var(--amber)':'var(--green)'}">${pendingBlockers()?I.alert:I.check}</span>
        <div class="tiny" style="flex:1"><b>${pendingBlockers()?pendingBlockers()+' unresolved blockers':'No blockers'}</b> · ${countStatus(s=>s.status==='approved')}/${SEC.length} sections approved. Review drafts can be exported anytime; final lock requires zero blockers.</div>
      </div>
      ${EXPORTS.map(e=>`<div class="export-row"><div class="eic" style="background:${e[3]}">${e[2]}</div><div class="info"><div class="nm">${e[0]}</div><div class="ds">${e[1]}</div></div><button class="btn sm primary" onclick="toast('Export started','${e[0]} is being generated')">${I.export}</button></div>`).join('')}
    </div>
    <div class="mf"><button class="btn" onclick="closeOverlays()">Close</button><button class="btn primary" onclick="toast('Generating bundle','Clean + review drafts and evidence pack');closeOverlays()">${I.export} Export full bundle</button></div>`);
}

function openModal(html){ document.getElementById('modalBox').innerHTML=html; document.getElementById('modal').classList.add('on'); document.getElementById('scrim').classList.add('on'); }

/* audit + toast */
function audit(who,type,txt,mem,memtxt){
  const now=new Date();
  AUDIT.unshift({t:`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,d:"23 Jun 2026",who,type,txt,mem:!!mem,memtxt});
}
function toast(title,sub,icon){
  const w=document.getElementById('toasts');
  const el=document.createElement('div'); el.className='toast';
  const ic=icon==='check'?I.check:icon==='alert'?I.alert:icon==='lock'?I.lock:I.bolt;
  el.innerHTML=`<span class="ic">${ic}</span><div class="col"><span>${title}</span>${sub?`<span class="sub">${sub}</span>`:''}</div>`;
  w.appendChild(el);
  setTimeout(()=>{el.classList.add('fade-out');setTimeout(()=>el.remove(),300)},2600);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeOverlays()});
/* global delegated evidence-mark clicks — every .ev-mark[data-ev] opens the source drawer */
document.addEventListener('click',e=>{const m=e.target.closest('.ev-mark[data-ev]');if(m){e.stopPropagation();e.preventDefault();openDrawer(m.getAttribute('data-ev'));}},true);

/* boot */
render();
</script>
</body>
