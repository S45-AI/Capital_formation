  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];

        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

              const { done, value } = await reader.read();

              totalLen += value.length;

    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\u002Fpath><\u002Fsvg>Transaction Brief<\u002Fdiv>\n      <div onclick=\"{{ nav.meeting }}\" style=\"{{ sx.meeting.row }}\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"{{ sx.meeting.icon }}\" stroke-width=\"1.4\"><path d=\"M3 3.5h10v7H8l-3 2.5V10.5H3z\"><\u002Fpath><\u002Fsvg>Meeting<\u002Fdiv>\n      <div onclick=\"{{ nav.handoff }}\" style=\"{{ sx.handoff.row }}\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"{{ sx.handoff.icon }}\" stroke-width=\"1.4\"><path d=\"M2.5 5.5 8 2.5l5.5 3v5L8 13.5 2.5 10.5z\"><\u002Fpath><path d=\"M2.5 5.5 8 8.5l5.5-3M8 8.5v5\"><\u002Fpath><\u002Fsvg>Handoff<\u002Fdiv>\n    <\u002Fnav>\n\n    <sc-if value=\"{{ showDoctrine }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"margin-top:auto;padding:14px 12px;border-radius:12px;background:#FFFFFF;border:1px solid #F9F8F7\">\n      <div style=\"font-size:11px;color:#91918E;letter-spacing:.04em;margin-bottom:6px\">DOCTRINE<\u002Fdiv>\n      <div style=\"font-family:'Martina Plantijn','New York','Iowan Old Style',ui-serif,Georgia,serif;font-size:13.5px;line-height:1.45;color:#2C2C2B\">S45 does not just collect data. It learns how companies become transactions.<\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Faside>\n\n  <div style=\"flex:1;display:flex;flex-direction:column;min-width:0\">\n\n    <header style=\"flex:none;background:rgba(251,250,246,.9);backdrop-filter:saturate(140%) blur(8px);border-bottom:1px solid #F9F8F7;padding:0 26px\">\n      <div style=\"display:flex;align-items:center;gap:14px;height:54px\">\n        <div style=\"display:flex;align-items:center;gap:8px;flex:none\">\n          <span style=\"font-size:11px;color:#91918E;letter-spacing:.04em\">COVERAGE<\u002Fspan>\n          <span style=\"font-weight:600;font-size:13px;color:#2C2C2B;white-space:nowrap\">Technical Textiles, India<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"width:1px;height:18px;background:#E1DFDB;flex:none\"><\u00 tyle=\"padding:9px 15px;border-radius:11px;background:#E3EEEC;border:1px solid #CDE6E2;font-size:13px;font-weight:600;color:#033935\">Trusted sector operator<\u002Fspan><span style=\"color:#B8DCD6;font-size:17px\">→<\u002Fspan><span style=\"padding:9px 15px;border-radius:11px;background:#033935;color:#fff;font-size:13px;font-weight:600\">S45 senior banker<\u002Fspan><span style=\"color:#B8DCD6;font-size:17px\">→<\u002Fspan><span style=\"padding:9px 15px;border-radius:11px;background:#fff;border:1.5px solid #C7B89A;font-size:13px;font-weight:600;color:#2C2C2B\">Rajiv Mehra<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;gap:24px;flex-wrap:wrap;margin-bottom:14px\"><span style=\"font-size:12.5px;color:#91918E\">Warmth <b style=\"color:#055D56\">High<\u002Fb><\u002Fspan><span style=\"font-size:12.5px;color:#91918E\">Credibility <b style=\"color:#055D56\">High<\u002Fb><\u002Fspan><span style=\"font-size:12.5px;color:#91918E\">Risk <b style=\"color:#055D56\">Low<\u002Fb><\u002Fspan><span style=\"font-size:12.5px;color:#91918E\">Best speaker <b style=\"color:#2C2C2B\">D. Kapoor<\u002Fb><\u002Fspan><\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px 22px\"><div><div style=\"font-size:11px;color:#91918E;margin-bottom:3px\">OPENING CONTEXT<\u002Fdiv><p style=\"font-size:12.5px;color:#2C2C2B;line-height:1.5\">Institutionalisation &amp; optionality — not immediate listing pressure.<\u002Fp><\u002Fdiv><div><div style=\"font-size:11px;color:#E56458;margin-bottom:3px\">DO NOT USE<\u002Fdiv><p style=\"font-size:12.5px;color:#C24A3F;line-height:1.5\">Cold IPO framing or any full-sale language.<\u002Fp><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n                <div style=\"background:#fff;border:1px solid #F9F8F7;border-radius:16px;padding:18px 20px\">\n                  <div style=\"display:flex;justify-content:space-between;margin-b div>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ briefMeeting }}\">\n            <div style=\"background:linear-gradient(165deg,#033935,#3C4474);border-radius:18px;padding:24px 28px;color:#fff;margin-bottom:16px;box-shadow:0 18px 40px -22px rgba(44,51,88,.5)\">\n              <div style=\"font-size:11px;color:#AEB4DD;letter-spacing:.1em;margin-bottom:11px\">OPENING NARRATIVE<\u002Fdiv>\n              <p style=\"font-family:'Martina Plantijn','New York',ui-serif,Georgia,serif;font-size:20px;line-height:1.5;color:#F4F5FB\">“You do not need to decide today whether to list or sell. The real question is whether the company should start becoming capital-market-ready now — while preserving control and increasing future optionality.”<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1.1fr 1fr;gap:16px;margin-bottom:16px\">\n              <div style=\"background:#fff;border:1px solid #F9F8F7;border-radius:16px;padding:20px 22px\">\n                <div style=\"font-weight:600;font-size:12px;letter-spacing:.1em;color:#91918E;margin-bottom:14px\">FIVE QUESTIONS<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:11px\">\n                  <div style=\"display:flex;gap:11px\"><span style=\"font-family:'Martina Plantijn','New York',ui-serif,serif;font-size:14px;color:#055D56;flex:none\">1<\u002Fspan><span style=\"font-size:13px;color:#2C2C2B;line-height:1.45\">How do you think about the next decade of ownership for Astra?<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;gap:11px\"><span style=\"font-family:'Martina Plantijn','New York',ui-serif,serif;font-size:14px;color:#055D56;flex:none\">2<\u002Fspan><span style=\"font-size:13px;color:#2C2C2B;line-height:1.45\">What would have to be true to bring in outside capital?<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;gap:11px\">
